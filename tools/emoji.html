  <style>
    .emoji-search-wrap {
      position: relative;
      margin-bottom: 16px;
    }
    .emoji-search-wrap input {
      width: 100%;
      padding: 12px 16px 12px 44px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 1rem;
      font-family: var(--font);
      outline: none;
      transition: border-color 0.2s;
    }
    .emoji-search-wrap input:focus { border-color: var(--accent); }
    .emoji-search-wrap input::placeholder { color: var(--text-muted); opacity: 0.5; }
    .emoji-search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 1.1rem;
      pointer-events: none;
    }
    .emoji-search-count {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 0.75rem;
    }

    .emoji-categories {
      display: flex;
      gap: 4px;
      padding: 8px 0 16px;
      overflow-x: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }
    .emoji-categories::-webkit-scrollbar { height: 4px; }
    .emoji-categories::-webkit-scrollbar-track { background: transparent; }
    .emoji-categories::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .cat-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-muted);
      font-size: 0.8rem;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s;
      font-family: var(--font);
    }
    .cat-btn:hover { border-color: var(--accent); color: var(--text); }
    .cat-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }
    .cat-btn .cat-icon { font-size: 1rem; }

    .emoji-section-title {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 12px 0 8px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 8px;
    }

    .emoji-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(48px, 1fr));
      gap: 4px;
      padding: 8px 0;
    }
    .emoji-cell {
      width: 100%;
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      border-radius: var(--radius);
      cursor: pointer;
      transition: all 0.15s;
      background: transparent;
      border: 1px solid transparent;
      position: relative;
    }
    .emoji-cell:hover {
      background: var(--surface-2);
      border-color: var(--border);
      transform: scale(1.15);
      z-index: 2;
    }
    .emoji-cell.copied {
      background: rgba(34, 197, 94, 0.15);
      border-color: var(--success);
    }

    .emoji-detail-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 16px;
      display: none;
    }
    .emoji-detail-panel.visible { display: block; }

    .detail-top {
      display: flex;
      align-items: flex-start;
      gap: 20px;
      margin-bottom: 16px;
    }
    .detail-emoji {
      font-size: 3.5rem;
      line-height: 1;
      background: var(--surface-2);
      border-radius: var(--radius);
      padding: 16px;
      min-width: 80px;
      text-align: center;
    }
    .detail-info { flex: 1; min-width: 0; }
    .detail-name {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .detail-codepoint {
      font-family: var(--mono);
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .skin-tones {
      display: flex;
      gap: 6px;
      margin-bottom: 12px;
    }
    .skin-tone-btn {
      width: 36px;
      height: 36px;
      font-size: 1.3rem;
      border-radius: 6px;
      border: 2px solid var(--border);
      background: var(--surface-2);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }
    .skin-tone-btn:hover { border-color: var(--accent); }
    .skin-tone-btn.active { border-color: var(--accent); background: rgba(99,102,241,0.15); }

    .copy-options {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .copy-opt {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .copy-opt-label {
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .copy-opt-value {
      font-family: var(--mono);
      font-size: 0.8rem;
      padding: 8px 12px;
      background: var(--surface-2);
      border-radius: 4px;
      cursor: pointer;
      word-break: break-all;
      transition: background 0.15s;
      color: var(--text);
    }
    .copy-opt-value:hover { background: var(--border); }
    .copy-opt-value.copied { background: rgba(34, 197, 94, 0.15); color: var(--success); }

    .recent-section {
      margin-bottom: 16px;
    }
    .recent-section .emoji-grid {
      grid-template-columns: repeat(auto-fill, minmax(42px, 1fr));
    }

    .emoji-container {
      max-height: 65vh;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
      padding-right: 4px;
    }
    .emoji-container::-webkit-scrollbar { width: 6px; }
    .emoji-container::-webkit-scrollbar-track { background: transparent; }
    .emoji-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .no-results {
      text-align: center;
      padding: 48px 16px;
      color: var(--text-muted);
    }
    .no-results .big-emoji { font-size: 3rem; margin-bottom: 12px; }

    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--success);
      color: #fff;
      padding: 10px 20px;
      border-radius: var(--radius);
      font-size: 0.85rem;
      font-weight: 600;
      opacity: 0;
      transition: all 0.3s ease;
      z-index: 1000;
      pointer-events: none;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 768px) {
      .emoji-grid {
        grid-template-columns: repeat(auto-fill, minmax(40px, 1fr));
      }
      .copy-options {
        grid-template-columns: 1fr;
      }
      .detail-top {
        flex-direction: column;
        align-items: center;
        text-align: center;
      }
      .skin-tones { justify-content: center; }
    }

  function getCodePoints(str) {
    const cps = [];
    for (const ch of str) {
      const cp = ch.codePointAt(0);
      if (cp !== 0xFE0F && cp !== 0x200D) {
        cps.push('U+' + cp.toString(16).toUpperCase().padStart(4, '0'));
      }
    }
    return cps.join(' ');
  }

  function getHtmlEntity(str) {
    const ents = [];
    for (const ch of str) {
      const cp = ch.codePointAt(0);
      ents.push('&#x' + cp.toString(16).toUpperCase() + ';');
    }
    return ents.join('');
  }

  function getCssCode(str) {
    const codes = [];
    for (const ch of str) {
      const cp = ch.codePointAt(0);
      codes.push('\\' + cp.toString(16).toUpperCase());
    }
    return codes.join('');
  }

      const cp = ch.codePointAt(0);
      if (cp > 0xFFFF) {
        codes.push('\\u{' + cp.toString(16).toUpperCase() + '}');
      } else {
        codes.push('\\u' + cp.toString(16).toUpperCase().padStart(4, '0'));
      }
    }
    return codes.join('');
  }

  function applySkintone(emoji, tone) {
    if (!tone) return emoji;
    // Insert skin tone modifier after the first codepoint
    const chars = [...emoji];
    return chars[0] + tone + chars.slice(1).join('');
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(t._timer);
    t._timer = setTimeout(() => t.classList.remove('show'), 1600);
  }

  function copyText(text, label) {
    navigator.clipboard.writeText(text).then(() => {
      showToast('Copied ' + (label || text) + '!');
    });
  }

  function addRecent(emoji) {
    recentEmojis = recentEmojis.filter(e => e !== emoji);
    recentEmojis.unshift(emoji);
    if (recentEmojis.length > 30) recentEmojis = recentEmojis.slice(0, 30);
    localStorage.setItem('emoji-recent', JSON.stringify(recentEmojis));
    renderRecent();
  }

  // ===== RENDERING =====
  function renderCategories() {
    const bar = document.getElementById('categoryBar');
    bar.innerHTML = CATEGORIES.map(c =>
      `<button class="cat-btn${c.id === currentCategory ? ' active' : ''}" data-cat="${c.id}">
        <span class="cat-icon">${c.icon}</span> ${c.label}
      </button>`
    ).join('');
    bar.addEventListener('click', e => {
      const btn = e.target.closest('.cat-btn');
      if (!btn) return;
      currentCategory = btn.dataset.cat;
      document.getElementById('searchInput').value = '';
      renderCategories();
      renderEmojis();
    });
  }

  function renderRecent() {
    const sec = document.getElementById('recentSection');
    const grid = document.getElementById('recentGrid');
    if (recentEmojis.length === 0) {
      sec.style.display = 'none';
      return;
    }
    sec.style.display = 'block';
    grid.innerHTML = recentEmojis.map(e =>
      `<div class="emoji-cell" data-emoji="${encodeURIComponent(e)}" title="Click to copy">${e}</div>`
    ).join('');
  }

  function renderEmojis(query) {
    const container = document.getElementById('emojiContainer');
    let filtered = EMOJIS;

    if (query && query.trim()) {
      const q = query.toLowerCase().trim();
      filtered = EMOJIS.filter(em =>
        em.n.toLowerCase().includes(q) || em.k.toLowerCase().includes(q)
      );
    } else if (currentCategory !== 'all') {
      filtered = EMOJIS.filter(em => em.c === currentCategory);
    }

    document.getElementById('searchCount').textContent = filtered.length + ' emojis';

    if (filtered.length === 0) {
      container.innerHTML = `<div class="no-results">
        <div class="big-emoji">\u{1F50D}</div>
        <p>No emojis found for "${query}"</p>
        <p style="font-size:0.8rem;margin-top:4px">Try a different keyword</p>
      </div>`;
      return;
    }

    if (query && query.trim()) {
      // Flat grid for search results
      container.innerHTML = `<div class="emoji-grid">${filtered.map(em =>
        `<div class="emoji-cell" data-idx="${EMOJIS.indexOf(em)}" title="${em.n}">${em.e}</div>`
      ).join('')}</div>`;
    } else if (currentCategory === 'all') {
      // Group by category
      const groups = {};
      for (const cat of CATEGORIES) {
        if (cat.id === 'all') continue;
        groups[cat.id] = filtered.filter(em => em.c === cat.id);
      }
      let html = '';
      for (const cat of CATEGORIES) {
        if (cat.id === 'all') continue;
        const items = groups[cat.id];
        if (!items || items.length === 0) continue;
        html += `<div class="emoji-section-title">${cat.icon} ${cat.label}</div>`;
        html += `<div class="emoji-grid">${items.map(em =>
          `<div class="emoji-cell" data-idx="${EMOJIS.indexOf(em)}" title="${em.n}">${em.e}</div>`
        ).join('')}</div>`;
      }
      container.innerHTML = html;
    } else {
      container.innerHTML = `<div class="emoji-grid">${filtered.map(em =>
        `<div class="emoji-cell" data-idx="${EMOJIS.indexOf(em)}" title="${em.n}">${em.e}</div>`
      ).join('')}</div>`;
    }
  }

  function showDetail(emojiObj) {
    selectedEmoji = emojiObj;
    selectedSkinTone = '';
    const panel = document.getElementById('detailPanel');
    panel.classList.add('visible');
    updateDetail();
  }

  function updateDetail() {
    if (!selectedEmoji) return;
    const em = selectedEmoji;
    const display = em.s ? applySkintone(em.e, selectedSkinTone) : em.e;

    document.getElementById('detailEmoji').textContent = display;
    document.getElementById('detailName').textContent = em.n;
    document.getElementById('detailCodepoint').textContent = getCodePoints(display);

    // Skin tones
    const st = document.getElementById('skinTones');
    if (em.s) {
      st.style.display = 'flex';
      st.innerHTML = SKIN_TONES.map(t =>
        `<button class="skin-tone-btn${t.mod === selectedSkinTone ? ' active' : ''}" data-tone="${t.mod}" title="${t.label}">
          ${applySkintone(em.e, t.mod)}
        </button>`
      ).join('');
    } else {
      st.style.display = 'none';
    }

    // Copy options
    const opts = document.getElementById('copyOptions');
    const formats = [
      { label: 'Emoji Character', value: display },
      { label: 'HTML Entity', value: getHtmlEntity(display) },
      { label: 'CSS Content', value: getCssCode(display) },
      { label: 'JavaScript Escape', value: getJsEscape(display) }
    ];
    opts.innerHTML = formats.map(f =>
      `<div class="copy-opt">
        <div class="copy-opt-label">${f.label}</div>
        <div class="copy-opt-value" data-copy="${encodeURIComponent(f.value)}" title="Click to copy">${f.value}</div>
      </div>`
    ).join('');
  }

  // ===== EVENT HANDLERS =====
  document.getElementById('searchInput').addEventListener('input', function() {
    const q = this.value;
    if (q.trim()) {
      // Deselect category when searching
      currentCategory = 'all';
      renderCategories();
    }
    renderEmojis(q);
  });

  document.getElementById('emojiContainer').addEventListener('click', function(e) {
    const cell = e.target.closest('.emoji-cell');
    if (!cell) return;
    const idx = cell.dataset.idx;
    if (idx !== undefined) {
      const emojiObj = EMOJIS[parseInt(idx)];
      // Single click: copy and show detail
      const display = emojiObj.s ? applySkintone(emojiObj.e, selectedSkinTone) : emojiObj.e;
      copyText(display, emojiObj.n);
      addRecent(display);
      showDetail(emojiObj);
      // Flash effect
      cell.classList.add('copied');
      setTimeout(() => cell.classList.remove('copied'), 600);
    }
  });

  document.getElementById('recentGrid').addEventListener('click', function(e) {
    const cell = e.target.closest('.emoji-cell');
    if (!cell) return;
    const emoji = decodeURIComponent(cell.dataset.emoji);
    copyText(emoji);
    addRecent(emoji);
    cell.classList.add('copied');
    setTimeout(() => cell.classList.remove('copied'), 600);
  });

  document.getElementById('skinTones').addEventListener('click', function(e) {
    const btn = e.target.closest('.skin-tone-btn');
    if (!btn) return;
    selectedSkinTone = btn.dataset.tone;
    updateDetail();
  });

  document.getElementById('copyOptions').addEventListener('click', function(e) {
    const val = e.target.closest('.copy-opt-value');
    if (!val) return;
    const text = decodeURIComponent(val.dataset.copy);
    copyText(text);
    val.classList.add('copied');
    setTimeout(() => val.classList.remove('copied'), 600);
  });

  // ===== INIT =====
  renderCategories();
  renderRecent();
  renderEmojis();
  </script>
  <script src="../js/monetization.js"></script>
</body>
</html>
