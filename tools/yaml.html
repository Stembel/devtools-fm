<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YAML to JSON Converter - Convert YAML JSON Online | DevTools.fm</title>
  <meta name="description" content="Convert between YAML and JSON instantly. Validate YAML, format JSON. Free online YAML/JSON converter.">
  <link rel="canonical" href="https://stembel.github.io/devtools-fm/tools/yaml.html">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <header>
    <div class="container">
      <a href="../" class="logo"><span>&gt;_</span> DevTools.fm</a>
      <nav><a href="../">All Tools</a></nav>
    </div>
  </header>

  <main class="container tool-page">
    <a href="../" class="back-link">&larr; All Tools</a>
    <h1>YAML &harr; JSON Converter</h1>
    <p class="description">Convert between YAML and JSON formats. Validate and format instantly in your browser.</p>

    <div class="action-bar">
      <div class="btn-group">
        <button class="btn btn-primary" onclick="yamlToJson()">YAML &rarr; JSON</button>
        <button class="btn btn-primary" onclick="jsonToYaml()">JSON &rarr; YAML</button>
        <button class="btn" onclick="copyOutput()">Copy</button>
        <button class="btn" onclick="clearAll()">Clear</button>
      </div>
    </div>

    <div class="tool-layout">
      <div class="tool-panel">
        <div class="panel-header">Input (YAML or JSON)</div>
        <textarea class="tool-textarea" id="input" placeholder="server:
  host: localhost
  port: 8080
  debug: true
database:
  name: myapp
  connection:
    - host: db1.example.com
    - host: db2.example.com"></textarea>
      </div>
      <div class="tool-panel">
        <div class="panel-header">
          Output
          <span id="status"></span>
        </div>
        <textarea class="tool-textarea" id="output" readonly placeholder="Converted output will appear here..."></textarea>
      </div>
    </div>
  </main>

  <footer><div class="container">DevTools.fm &mdash; Free developer tools.</div></footer>

  <script>
    const $i = document.getElementById('input');
    const $o = document.getElementById('output');
    const $s = document.getElementById('status');

    // Lightweight YAML parser (handles common cases)
    function parseYAML(text) {
      const lines = text.split('\n');
      const result = {};
      const stack = [{obj: result, indent: -1}];

      for (let i = 0; i < lines.length; i++) {
        const line = lines[i];
        if (!line.trim() || line.trim().startsWith('#')) continue;

        const indent = line.search(/\S/);
        const content = line.trim();

        // Pop stack to find parent
        while (stack.length > 1 && stack[stack.length-1].indent >= indent) stack.pop();
        const parent = stack[stack.length-1];

        // Array item
        if (content.startsWith('- ')) {
          const val = content.slice(2).trim();
          const container = parent.obj;
          const lastKey = parent.lastKey;

          if (lastKey && !Array.isArray(container[lastKey])) {
            container[lastKey] = [];
          }
          const arr = lastKey ? container[lastKey] : container;

          if (val.includes(': ')) {
            const colonIdx = val.indexOf(': ');
            const k = val.slice(0, colonIdx).trim();
            const v = parseValue(val.slice(colonIdx + 2).trim());
            const item = {[k]: v};
            if (Array.isArray(arr)) arr.push(item);
          } else {
            if (Array.isArray(arr)) arr.push(parseValue(val));
          }
          continue;
        }

        // Key: value
        const colonIdx = content.indexOf(':');
        if (colonIdx === -1) continue;

        const key = content.slice(0, colonIdx).trim();
        const rawVal = content.slice(colonIdx + 1).trim();

        if (rawVal === '' || rawVal === '|' || rawVal === '>') {
          // Nested object or block scalar
          if (Array.isArray(parent.obj)) {
            const obj = {};
            parent.obj.push(obj);
            parent.obj = obj;
          }
          const target = Array.isArray(parent.obj) ? parent.obj[parent.obj.length-1] : parent.obj;
          target[key] = {};
          stack.push({obj: target[key], indent: indent, lastKey: key});
          parent.lastKey = key;
        } else {
          const target = parent.obj;
          target[key] = parseValue(rawVal);
          parent.lastKey = key;
        }
      }
      return result;
    }

    function parseValue(s) {
      if (s === 'true' || s === 'True' || s === 'TRUE') return true;
      if (s === 'false' || s === 'False' || s === 'FALSE') return false;
      if (s === 'null' || s === 'Null' || s === '~') return null;
      if (/^-?\d+$/.test(s)) return parseInt(s, 10);
      if (/^-?\d+\.\d+$/.test(s)) return parseFloat(s);
      if ((s.startsWith('"') && s.endsWith('"')) || (s.startsWith("'") && s.endsWith("'")))
        return s.slice(1, -1);
      if (s.startsWith('[') && s.endsWith(']')) {
        try { return JSON.parse(s); } catch(e) {}
        return s.slice(1,-1).split(',').map(v => parseValue(v.trim()));
      }
      return s;
    }

    function toYAML(obj, indent = 0) {
      const pad = '  '.repeat(indent);
      let result = '';

      if (Array.isArray(obj)) {
        for (const item of obj) {
          if (typeof item === 'object' && item !== null) {
            const entries = Object.entries(item);
            result += pad + '- ' + entries[0][0] + ': ' + formatVal(entries[0][1]) + '\n';
            for (let i = 1; i < entries.length; i++) {
              result += pad + '  ' + entries[i][0] + ': ' + formatVal(entries[i][1]) + '\n';
            }
          } else {
            result += pad + '- ' + formatVal(item) + '\n';
          }
        }
      } else if (typeof obj === 'object' && obj !== null) {
        for (const [key, val] of Object.entries(obj)) {
          if (typeof val === 'object' && val !== null) {
            result += pad + key + ':\n' + toYAML(val, indent + 1);
          } else {
            result += pad + key + ': ' + formatVal(val) + '\n';
          }
        }
      }
      return result;
    }

    function formatVal(v) {
      if (v === null) return 'null';
      if (typeof v === 'boolean') return v.toString();
      if (typeof v === 'number') return v.toString();
      if (typeof v === 'string') {
        if (/[:#{}[\],&*?|>!'"%@`]/.test(v) || v === '' || v === 'true' || v === 'false' || v === 'null')
          return '"' + v.replace(/"/g, '\\"') + '"';
        return v;
      }
      return String(v);
    }

    function yamlToJson() {
      const raw = $i.value.trim();
      if (!raw) return;
      try {
        const obj = parseYAML(raw);
        $o.value = JSON.stringify(obj, null, 2);
        $s.textContent = 'Converted to JSON';
        $s.className = 'status status-success';
      } catch(e) {
        $o.value = '';
        $s.textContent = 'Parse error: ' + e.message;
        $s.className = 'status status-error';
      }
    }

    function jsonToYaml() {
      const raw = $i.value.trim();
      if (!raw) return;
      try {
        const obj = JSON.parse(raw);
        $o.value = toYAML(obj).trim();
        $s.textContent = 'Converted to YAML';
        $s.className = 'status status-success';
      } catch(e) {
        $o.value = '';
        $s.textContent = 'JSON parse error: ' + e.message;
        $s.className = 'status status-error';
      }
    }

    function copyOutput() {
      if ($o.value) {
        navigator.clipboard.writeText($o.value);
        $s.textContent = 'Copied!';
        $s.className = 'status status-success';
      }
    }

    function clearAll() { $i.value = ''; $o.value = ''; $s.textContent = ''; $s.className = ''; }
  </script>
</body>
</html>
