<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>URL Encode / Decode - DevTools.fm</title>
  <meta name="description" content="URL encode and decode strings online. Handle special characters, query parameters, and full URLs. Free, runs in your browser.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <header>
    <div class="container">
      <a href="/" class="logo"><span>&gt;_</span> DevTools.fm</a>
      <nav><a href="/">All Tools</a></nav>
    </div>
  </header>

  <main class="container tool-page">
    <a href="/" class="back-link">&larr; All Tools</a>
    <h1>URL Encode / Decode</h1>
    <p class="description">Encode or decode URL components and full URLs. Handles UTF-8 and special characters.</p>

    <div class="action-bar">
      <div class="btn-group">
        <button class="btn btn-primary" onclick="doEncode()">Encode</button>
        <button class="btn btn-primary" onclick="doDecode()">Decode</button>
        <button class="btn" onclick="encodeComponent()">Encode Component</button>
        <button class="btn" onclick="copyOut()">Copy</button>
        <button class="btn" onclick="swap()">Swap</button>
        <button class="btn" onclick="clearAll()">Clear</button>
      </div>
    </div>

    <div class="tool-layout">
      <div class="tool-panel">
        <div class="panel-header">Input</div>
        <textarea class="tool-textarea" id="input" placeholder="Enter a URL or text to encode/decode...&#10;&#10;Example: https://example.com/path?q=hello world&lang=de"></textarea>
      </div>
      <div class="tool-panel">
        <div class="panel-header">Output <span id="status"></span></div>
        <textarea class="tool-textarea" id="output" readonly placeholder="Result..."></textarea>
      </div>
    </div>
  </main>

  <footer><div class="container">DevTools.fm &mdash; Free developer tools.</div></footer>

  <script>
    const $i = document.getElementById('input');
    const $o = document.getElementById('output');
    const $s = document.getElementById('status');

    function ok(msg) { $s.textContent = msg; $s.className = 'status status-success'; }
    function err(msg) { $s.textContent = msg; $s.className = 'status status-error'; }

    function doEncode() {
      try { $o.value = encodeURI($i.value); ok('Encoded (encodeURI)'); }
      catch (e) { err(e.message); }
    }
    function doDecode() {
      try { $o.value = decodeURI($i.value.trim()); ok('Decoded (decodeURI)'); }
      catch (e) { err(e.message); }
    }
    function encodeComponent() {
      try { $o.value = encodeURIComponent($i.value); ok('Encoded (component)'); }
      catch (e) { err(e.message); }
    }
    function copyOut() {
      if ($o.value) { navigator.clipboard.writeText($o.value); ok('Copied!'); }
    }
    function swap() { const t = $i.value; $i.value = $o.value; $o.value = t; }
    function clearAll() { $i.value = ''; $o.value = ''; $s.textContent = ''; }
  </script>
</body>
</html>
