  <title>ASCII Art Text Generator - Create Text Art Online | ZeroKit.dev</title>
  <meta name="description" content="Generate large ASCII art text from any input. Multiple font styles: Banner, Block, Standard, Small, Big. Free, fast, no signup.">
  <link rel="canonical" href="https://zerokit.dev/tools/asciiart.html">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<body>
  <header>
    <div class="container">
      <a href="../" class="logo"><span>&gt;_</span> ZeroKit.dev</a>
      <nav><a href="../">All Tools</a></nav>
    </div>
  </header>

  <main class="container tool-page">
    <a href="../" class="back-link">&larr; All Tools</a>
    <h1>ASCII Art Text Generator</h1>
    <p class="description">Type text and see it rendered as large ASCII art. Multiple font styles, live preview, copy with one click.</p>

    <div class="action-bar">
      <div class="btn-group">
        <button class="btn btn-primary" onclick="copyOutput()">Copy Output</button>
        <button class="btn" onclick="clearAll()">Clear</button>
      </div>
      <div class="options-row">
        <label>Font:
          <select id="fontStyle" onchange="renderArt()">
            <option value="banner">Banner</option>
            <option value="block" selected>Block</option>
            <option value="standard">Standard</option>
            <option value="small">Small</option>
            <option value="big">Big</option>
          </select>
        </label>
        <label>Max Width:
          <input type="number" id="maxWidth" value="80" min="20" max="200" step="10" onchange="renderArt()">
        </label>
        <label>Character:
          <select id="fillChar" onchange="renderArt()">
            <option value="#">#</option>
            <option value="@">@</option>
            <option value="*">*</option>
            <option value="=">&#61;</option>
            <option value="0">0</option>
            <option value="X">X</option>
          </select>
        </label>
      </div>
    </div>

    <div class="tool-layout" style="grid-template-columns: 1fr;">
      <div class="tool-panel">
        <div class="panel-header">Input Text</div>
        <input type="text" id="input" class="ascii-input" placeholder="Type your text here..." maxlength="50" oninput="renderArt()">
      </div>
      <div class="tool-panel">
        <div class="panel-header">
          ASCII Art Output
          <span id="status"></span>
        </div>
        <pre class="ascii-output" id="output">Type something above to see ASCII art...</pre>
      </div>
    </div>
  </main>

  <footer><div class="container">ZeroKit.dev &mdash; Free developer tools.</div></footer>

      color: var(--text);

      font-size: 1.1rem;
      outline: none;
    }
    .ascii-input::placeholder { color: var(--text-muted); opacity: 0.5; }

      white-space: pre;
      margin: 0;
      tab-size: 4;

    // ===== RENDERING ENGINE =====
    const $input = document.getElementById('input');
    const $output = document.getElementById('output');
    const $status = document.getElementById('status');
    const $fontStyle = document.getElementById('fontStyle');
    const $maxWidth = document.getElementById('maxWidth');
    const $fillChar = document.getElementById('fillChar');

    function renderArt() {
      const text = $input.value.toUpperCase();
      if (!text) {
        $output.textContent = 'Type something above to see ASCII art...';
        $output.style.color = 'var(--text-muted)';
        $status.textContent = '';
        $status.className = '';
        return;
      }

      $output.style.color = 'var(--accent)';
      const fontName = $fontStyle.value;
      const font = FONTS[fontName];
      const maxWidth = parseInt($maxWidth.value) || 80;
      const fill = $fillChar.value;

      const height = font.height;
      const spaceWidth = font.space;

      // Build array of character art arrays
      const charArts = [];
      for (const ch of text) {
        if (ch === ' ') {
          // Space: empty columns
          const spaceArt = [];
          for (let r = 0; r < height; r++) {
            spaceArt.push(' '.repeat(spaceWidth));
          }
          charArts.push(spaceArt);
        } else if (font.chars[ch]) {
          charArts.push(font.chars[ch]);
        }
        // Skip unknown characters silently
      }

      if (charArts.length === 0) {
        $output.textContent = 'No renderable characters found.';
        $output.style.color = 'var(--text-muted)';
        return;
      }

      // Word-wrap: split into lines that fit within maxWidth
      const lines = [];
      let currentLine = [];
      let currentWidth = 0;

      for (let i = 0; i < charArts.length; i++) {
        const charWidth = charArts[i][0].length;
        const gapWidth = currentLine.length > 0 ? 1 : 0; // 1 col gap between chars

        if (currentWidth + gapWidth + charWidth > maxWidth && currentLine.length > 0) {
          lines.push(currentLine);
          currentLine = [charArts[i]];
          currentWidth = charWidth;
        } else {
          currentLine.push(charArts[i]);
          currentWidth += gapWidth + charWidth;
        }
      }
      if (currentLine.length > 0) {
        lines.push(currentLine);
      }

      // Render each line
      const outputLines = [];
      for (const lineChars of lines) {
        for (let row = 0; row < height; row++) {
          let rowStr = '';
          for (let c = 0; c < lineChars.length; c++) {
            if (c > 0) rowStr += ' '; // 1-char gap between letters
            rowStr += lineChars[c][row];
          }
          outputLines.push(rowStr);
        }
        outputLines.push(''); // Blank line between wrapped lines
      }

      // Replace '#' with chosen fill character
      let result = outputLines.join('\n');
      if (fill !== '#') {
        result = result.replace(/#/g, fill);
      }

      $output.textContent = result;
      showStatus(text.length + ' char' + (text.length !== 1 ? 's' : '') + ' rendered', true);
    }

    function copyOutput() {
      const text = $output.textContent;
      if (text && text !== 'Type something above to see ASCII art...') {
        navigator.clipboard.writeText(text);
        showStatus('Copied to clipboard!', true);
      }
    }

    function clearAll() {
      $input.value = '';
      $output.textContent = 'Type something above to see ASCII art...';
      $output.style.color = 'var(--text-muted)';
      $status.textContent = '';
      $status.className = '';
    }

    function showStatus(msg, ok) {
      $status.textContent = msg;
      $status.className = ok ? 'status status-success' : 'status status-error';
    }

    // Render on load if there's content
    renderArt();
