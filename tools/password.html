<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Password Generator - Strong Random Passwords | DevTools.fm</title>
  <meta name="description" content="Generate strong, random passwords instantly. Customize length, characters, and complexity. Everything runs in your browser.">
  <link rel="canonical" href="https://stembel.github.io/devtools-fm/tools/password.html">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <header>
    <div class="container">
      <a href="../" class="logo"><span>&gt;_</span> DevTools.fm</a>
      <nav><a href="../">All Tools</a></nav>
    </div>
  </header>

  <main class="container tool-page">
    <a href="../" class="back-link">&larr; All Tools</a>
    <h1>Password Generator</h1>
    <p class="description">Generate cryptographically secure random passwords. Nothing leaves your browser.</p>

    <div class="tool-controls" style="display:flex;flex-wrap:wrap;gap:12px;align-items:center;margin-bottom:16px">
      <label>Length: <input type="range" id="length" min="8" max="128" value="20" oninput="document.getElementById('lenVal').textContent=this.value;generate()"> <span id="lenVal">20</span></label>
      <label><input type="checkbox" id="upper" checked onchange="generate()"> A-Z</label>
      <label><input type="checkbox" id="lower" checked onchange="generate()"> a-z</label>
      <label><input type="checkbox" id="digits" checked onchange="generate()"> 0-9</label>
      <label><input type="checkbox" id="symbols" checked onchange="generate()"> !@#$%</label>
      <label>Count: <input type="number" id="count" value="5" min="1" max="50" style="width:60px;padding:6px;border-radius:6px;border:1px solid #333;background:#1a1a2e;color:#e0e0e0;font-family:'JetBrains Mono',monospace" onchange="generate()"></label>
    </div>

    <div class="button-group" style="margin-bottom:16px">
      <button onclick="generate()" class="btn primary">Generate</button>
      <button onclick="copyAll()" class="btn">Copy All</button>
    </div>

    <div id="output" class="output-area" style="min-height:160px;white-space:pre-line;user-select:all;line-height:2"></div>

    <div id="strength" style="margin-top:12px;padding:12px;border-radius:8px;background:#1a1a2e;font-family:'JetBrains Mono',monospace;font-size:13px"></div>
    <div id="status" class="status"></div>
  </main>

  <footer>
    <div class="container">DevTools.fm &mdash; Free developer tools. All processing happens in your browser.</div>
  </footer>

  <script>
    const CHARSETS = {
      upper: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ',
      lower: 'abcdefghijklmnopqrstuvwxyz',
      digits: '0123456789',
      symbols: '!@#$%^&*()_+-=[]{}|;:,.<>?'
    };

    function genPassword(len, charset) {
      const arr = new Uint32Array(len);
      crypto.getRandomValues(arr);
      return Array.from(arr, v => charset[v % charset.length]).join('');
    }

    function generate() {
      let charset = '';
      for (const [id, chars] of Object.entries(CHARSETS)) {
        if (document.getElementById(id).checked) charset += chars;
      }
      if (!charset) { charset = CHARSETS.lower + CHARSETS.digits; document.getElementById('lower').checked = true; document.getElementById('digits').checked = true; }

      const len = parseInt(document.getElementById('length').value);
      const count = Math.min(Math.max(parseInt(document.getElementById('count').value) || 1, 1), 50);
      const passwords = Array.from({length: count}, () => genPassword(len, charset));
      document.getElementById('output').textContent = passwords.join('\n');

      const entropy = Math.floor(len * Math.log2(charset.length));
      let label = 'Weak', color = '#ef4444';
      if (entropy >= 128) { label = 'Very Strong'; color = '#22c55e'; }
      else if (entropy >= 80) { label = 'Strong'; color = '#84cc16'; }
      else if (entropy >= 60) { label = 'Good'; color = '#eab308'; }
      else if (entropy >= 40) { label = 'Fair'; color = '#f97316'; }
      document.getElementById('strength').innerHTML =
        `Entropy: <strong>${entropy} bits</strong> &mdash; <span style="color:${color}">${label}</span> (charset: ${charset.length} chars)`;
    }

    function copyAll() {
      navigator.clipboard.writeText(document.getElementById('output').textContent);
      document.getElementById('status').textContent = 'Copied to clipboard!';
    }

    generate();
  </script>
</body>
</html>
