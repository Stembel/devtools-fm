<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Box Shadow Generator | DevTools.fm</title>
  <meta name="description" content="Create CSS box-shadow effects visually. Adjust offset, blur, spread, and color. Copy CSS code instantly. Free online box shadow generator.">
  <link rel="canonical" href="https://zerokit.dev/tools/boxshadow.html">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="../js/cookie-consent.js"></script>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5826340473830405" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .shadow-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .shadow-preview-area { display: flex; align-items: center; justify-content: center; min-height: 350px; background: #1a1a2e; }
    .shadow-box { width: 180px; height: 180px; background: var(--surface); border-radius: 12px; transition: box-shadow 0.15s; }
    .shadow-controls { padding: 16px; display: flex; flex-direction: column; gap: 14px; }
    .slider-group { display: flex; flex-direction: column; gap: 4px; }
    .slider-group .slider-header { display: flex; justify-content: space-between; align-items: center; }
    .slider-group label { font-size: 0.8rem; font-weight: 600; color: var(--text-muted); }
    .slider-group .slider-value { font-family: var(--mono); font-size: 0.8rem; color: var(--accent); }
    .slider-group input[type="range"] { width: 100%; accent-color: var(--accent); }
    .shadow-row { display: flex; gap: 12px; align-items: center; }
    .shadow-row input[type="color"] { width: 36px; height: 30px; border: none; cursor: pointer; border-radius: 4px; }
    .shadow-row label { font-size: 0.8rem; color: var(--text-muted); display: flex; align-items: center; gap: 6px; }
    .shadow-row input[type="checkbox"] { accent-color: var(--accent); }
    .layers-list { display: flex; flex-direction: column; gap: 6px; }
    .layer-item { display: flex; align-items: center; gap: 8px; padding: 8px; background: var(--surface-2); border-radius: 4px; font-size: 0.8rem; }
    .layer-item.active { border: 1px solid var(--accent); }
    .layer-item .remove-layer { background: none; border: none; color: var(--error); cursor: pointer; font-size: 1rem; margin-left: auto; }
    .css-out { padding: 16px; }
    .css-out pre { background: var(--surface-2); padding: 12px; border-radius: 4px; font-family: var(--mono); font-size: 0.8rem; color: var(--text); cursor: pointer; white-space: pre-wrap; word-break: break-all; }
    .shadow-presets { display: flex; gap: 8px; flex-wrap: wrap; padding: 0 0 8px; }
    .shadow-preset { width: 48px; height: 48px; background: var(--surface); border-radius: 8px; cursor: pointer; border: 2px solid transparent; transition: border-color 0.15s; }
    .shadow-preset:hover { border-color: var(--accent); }
    @media (max-width: 768px) { .shadow-layout { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <header>
    <div class="container">
      <a href="../" class="logo"><span>&gt;_</span> DevTools.fm</a>
      <nav><a href="../">All Tools</a></nav>
    </div>
  </header>

  <main class="container tool-page">
    <a href="../" class="back-link">&larr; All Tools</a>
    <h1>CSS Box Shadow Generator</h1>
    <p class="description">Design box shadows visually with multiple layers. Copy CSS with one click.</p>

    <div class="shadow-layout">
      <div class="tool-panel">
        <div class="panel-header">Controls</div>
        <div class="shadow-controls">
          <div class="shadow-presets" id="presets"></div>

          <div class="slider-group">
            <div class="slider-header"><label>Horizontal Offset</label><span class="slider-value" id="hVal">4px</span></div>
            <input type="range" id="hOffset" min="-50" max="50" value="4" oninput="update()">
          </div>
          <div class="slider-group">
            <div class="slider-header"><label>Vertical Offset</label><span class="slider-value" id="vVal">4px</span></div>
            <input type="range" id="vOffset" min="-50" max="50" value="4" oninput="update()">
          </div>
          <div class="slider-group">
            <div class="slider-header"><label>Blur Radius</label><span class="slider-value" id="bVal">12px</span></div>
            <input type="range" id="blur" min="0" max="100" value="12" oninput="update()">
          </div>
          <div class="slider-group">
            <div class="slider-header"><label>Spread Radius</label><span class="slider-value" id="sVal">0px</span></div>
            <input type="range" id="spread" min="-50" max="50" value="0" oninput="update()">
          </div>
          <div class="shadow-row">
            <input type="color" id="shadowColor" value="#000000" onchange="update()">
            <div class="slider-group" style="flex:1;">
              <div class="slider-header"><label>Opacity</label><span class="slider-value" id="oVal">25%</span></div>
              <input type="range" id="opacity" min="0" max="100" value="25" oninput="update()">
            </div>
          </div>
          <div class="shadow-row">
            <label><input type="checkbox" id="inset" onchange="update()"> Inset</label>
          </div>
        </div>
      </div>

      <div class="tool-panel" style="display:flex; flex-direction:column;">
        <div class="panel-header">Preview</div>
        <div class="shadow-preview-area" style="flex:1;">
          <div class="shadow-box" id="previewBox"></div>
        </div>
        <div class="css-out">
          <div style="font-size:0.75rem; color:var(--text-muted); margin-bottom:4px;">CSS (click to copy)</div>
          <pre id="cssOutput" onclick="copyCSS()"></pre>
        </div>
      </div>
    </div>
  </main>

  <footer><div class="container">DevTools.fm &mdash; Free developer tools.</div></footer>

  <script>
    const presetData = [
      { h: 0, v: 2, b: 8, s: 0, color: '#000000', opacity: 15, inset: false },
      { h: 0, v: 4, b: 20, s: 0, color: '#000000', opacity: 25, inset: false },
      { h: 0, v: 8, b: 32, s: -4, color: '#000000', opacity: 30, inset: false },
      { h: 0, v: 0, b: 0, s: 3, color: '#6366f1', opacity: 50, inset: false },
      { h: 0, v: 0, b: 20, s: 0, color: '#6366f1', opacity: 40, inset: false },
      { h: 4, v: 4, b: 0, s: 0, color: '#6366f1', opacity: 100, inset: false },
      { h: 0, v: 2, b: 8, s: 0, color: '#000000', opacity: 20, inset: true },
      { h: 0, v: 20, b: 40, s: -8, color: '#000000', opacity: 40, inset: false },
    ];

    function hexToRgb(hex) {
      const r = parseInt(hex.slice(1,3), 16);
      const g = parseInt(hex.slice(3,5), 16);
      const b = parseInt(hex.slice(5,7), 16);
      return { r, g, b };
    }

    function getShadowCSS() {
      const h = document.getElementById('hOffset').value;
      const v = document.getElementById('vOffset').value;
      const b = document.getElementById('blur').value;
      const s = document.getElementById('spread').value;
      const color = document.getElementById('shadowColor').value;
      const opacity = document.getElementById('opacity').value / 100;
      const inset = document.getElementById('inset').checked;
      const rgb = hexToRgb(color);
      return `${inset ? 'inset ' : ''}${h}px ${v}px ${b}px ${s}px rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, ${opacity})`;
    }

    function update() {
      document.getElementById('hVal').textContent = document.getElementById('hOffset').value + 'px';
      document.getElementById('vVal').textContent = document.getElementById('vOffset').value + 'px';
      document.getElementById('bVal').textContent = document.getElementById('blur').value + 'px';
      document.getElementById('sVal').textContent = document.getElementById('spread').value + 'px';
      document.getElementById('oVal').textContent = document.getElementById('opacity').value + '%';

      const shadow = getShadowCSS();
      document.getElementById('previewBox').style.boxShadow = shadow;
      document.getElementById('cssOutput').textContent = `box-shadow: ${shadow};`;
    }

    function applyPreset(p) {
      document.getElementById('hOffset').value = p.h;
      document.getElementById('vOffset').value = p.v;
      document.getElementById('blur').value = p.b;
      document.getElementById('spread').value = p.s;
      document.getElementById('shadowColor').value = p.color;
      document.getElementById('opacity').value = p.opacity;
      document.getElementById('inset').checked = p.inset;
      update();
    }

    function renderPresets() {
      const container = document.getElementById('presets');
      presetData.forEach(p => {
        const div = document.createElement('div');
        div.className = 'shadow-preset';
        const rgb = hexToRgb(p.color);
        const shadow = `${p.inset ? 'inset ' : ''}${p.h}px ${p.v}px ${p.b}px ${p.s}px rgba(${rgb.r},${rgb.g},${rgb.b},${p.opacity/100})`;
        div.style.boxShadow = shadow;
        div.onclick = () => applyPreset(p);
        container.appendChild(div);
      });
    }

    function copyCSS() {
      const text = document.getElementById('cssOutput').textContent;
      navigator.clipboard.writeText(text);
      const el = document.getElementById('cssOutput');
      const orig = el.textContent;
      el.textContent = 'Copied!';
      setTimeout(() => el.textContent = orig, 1000);
    }

    renderPresets();
    update();
  </script>
  <script src="../js/monetization.js"></script>
</body>
</html>
